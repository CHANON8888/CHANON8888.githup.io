<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกรายรับ-รายจ่าย</title>
    <style>
        /* การตั้งค่าสไตล์เบื้องต้น (CSS) */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f3f4f6; 
            margin: 0; 
            padding: 20px; 
            color: #333;
        }
        .container { 
            max-width: 800px; 
            margin: auto; 
            background: white; 
            padding: 20px 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        h1, h2 { text-align: center; color: #1f2937; }
        
        /* กล่องสรุปยอด */
        .dashboard { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .card { 
            background: #f9fafb; 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #e5e7eb;
            text-align: center; 
        }
        .card h3 { margin-top: 0; color: #4b5563; }
        .text-green { color: #10b981; font-weight: bold; }
        .text-red { color: #ef4444; font-weight: bold; }
        .text-blue { color: #3b82f6; font-weight: bold; font-size: 1.2em; }
        hr { border: 0; height: 1px; background: #e5e7eb; margin: 15px 0; }

        /* ฟอร์มกรอกข้อมูล */
        .form-group { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            background: #f0fdf4; 
            padding: 20px; 
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #bbf7d0;
        }
        input, select, button { 
            padding: 10px; 
            border: 1px solid #d1d5db; 
            border-radius: 6px; 
            font-size: 16px;
            width: 100%;
        }
        button { 
            background: #10b981; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            grid-column: span 2;
        }
        button:hover { background: #059669; }

        /* ตารางประวัติ */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }
        th, td { 
            padding: 12px; 
            border-bottom: 1px solid #e5e7eb; 
            text-align: left; 
        }
        th { background-color: #f3f4f6; }
        .btn-delete { 
            background: #ef4444; 
            color: white; 
            padding: 5px 10px; 
            border-radius: 4px; 
            cursor: pointer;
            border: none;
            width: auto;
        }
        .btn-delete:hover { background: #dc2626; }

        /* รองรับหน้าจอมือถือ */
        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; }
            .form-group { grid-template-columns: 1fr; }
            button { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 บันทึกรายรับ-รายจ่าย</h1>

        <!-- ส่วนแสดงสรุปผล (Dashboard) -->
        <div class="dashboard">
            <div class="card">
                <h3>📅 สรุปยอดวันนี้</h3>
                <p>รายรับ: <span id="today-income" class="text-green">0</span> บาท</p>
                <p>รายจ่าย: <span id="today-expense" class="text-red">0</span> บาท</p>
            </div>
            <div class="card">
                <h3>🗓️ สรุปยอดเดือนนี้</h3>
                <p>รายรับ: <span id="month-income" class="text-green">0</span> บาท</p>
                <p>รายจ่าย: <span id="month-expense" class="text-red">0</span> บาท</p>
                <hr>
                <p>ยอดเงินคงเหลือ: <span id="month-balance" class="text-blue">0</span> บาท</p>
            </div>
        </div>

        <!-- ส่วนฟอร์มบันทึกข้อมูล -->
        <form id="finance-form" class="form-group">
            <input type="date" id="date" required>
            <select id="type" required>
                <option value="income">🟢 รายรับ</option>
                <option value="expense">🔴 รายจ่าย</option>
            </select>
            <input type="text" id="desc" placeholder="ชื่อรายการ (เช่น ค่าอาหาร, เงินเดือน)" required>
            <input type="number" id="amount" placeholder="จำนวนเงิน (บาท)" min="1" required>
            <button type="submit">➕ บันทึกรายการ</button>
        </form>

        <!-- ส่วนแสดงประวัติ -->
        <h2>ประวัติการทำรายการ</h2>
        <table>
            <thead>
                <tr>
                    <th>วันที่</th>
                    <th>รายการ</th>
                    <th>ประเภท</th>
                    <th>จำนวนเงิน</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- ข้อมูลจะถูกสร้างที่นี่ด้วย JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        // ดึงข้อมูลจาก LocalStorage ถ้าไม่มีให้เป็น Array ว่าง
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        const form = document.getElementById('finance-form');
        const dateInput = document.getElementById('date');

        // ตั้งค่าวัดที่ในฟอร์มให้เป็นวันปัจจุบันอัตโนมัติ
        dateInput.valueAsDate = new Date();

        // ฟังก์ชันอัปเดตหน้าจอ (ตารางและยอดสรุป)
        function updateUI() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            let todayIncome = 0, todayExpense = 0;
            let monthIncome = 0, monthExpense = 0;

            // หาวันที่ปัจจุบัน และ เดือนปัจจุบัน (Format: YYYY-MM)
            const todayStr = new Date().toISOString().split('T')[0];
            const currentMonthStr = todayStr.substring(0, 7);

            // เรียงข้อมูลจากวันที่ล่าสุดไปเก่าสุด
            const sortedTransactions = transactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            sortedTransactions.forEach((t, index) => {
                // 1. คำนวณสรุปยอดรายวัน
                if (t.date === todayStr) {
                    if (t.type === 'income') todayIncome += t.amount;
                    else todayExpense += t.amount;
                }
                
                // 2. คำนวณสรุปยอดรายเดือน
                if (t.date.startsWith(currentMonthStr)) {
                    if (t.type === 'income') monthIncome += t.amount;
                    else monthExpense += t.amount;
                }

                // 3. สร้างแถวในตาราง
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${t.date}</td>
                    <td>${t.desc}</td>
                    <td class="${t.type === 'income' ? 'text-green' : 'text-red'}">
                        ${t.type === 'income' ? 'รายรับ' : 'รายจ่าย'}
                    </td>
                    <td>${t.amount.toLocaleString()} ฿</td>
                    <td><button class="btn-delete" onclick="deleteItem(${index})">ลบ</button></td>
                `;
                tbody.appendChild(tr);
            });

            // แสดงผลยอดสรุปไปที่ HTML
            document.getElementById('today-income').innerText = todayIncome.toLocaleString();
            document.getElementById('today-expense').innerText = todayExpense.toLocaleString();
            document.getElementById('month-income').innerText = monthIncome.toLocaleString();
            document.getElementById('month-expense').innerText = monthExpense.toLocaleString();
            document.getElementById('month-balance').innerText = (monthIncome - monthExpense).toLocaleString();
        }

        // ฟังก์ชันเมื่อกด Submit Form
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newTransaction = {
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                desc: document.getElementById('desc').value,
                amount: parseFloat(document.getElementById('amount').value)
            };

            transactions.push(newTransaction);
            localStorage.setItem('transactions', JSON.stringify(transactions)); // บันทึกลงเครื่อง
            
            // รีเซ็ตฟอร์มเฉพาะชื่อรายการและจำนวนเงิน
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            
            updateUI(); // อัปเดตหน้าจอ
        });

        // ฟังก์ชันลบรายการ
        function deleteItem(index) {
            if(confirm("คุณต้องการลบรายการนี้ใช่หรือไม่?")) {
                transactions.splice(index, 1);
                localStorage.setItem('transactions', JSON.stringify(transactions));
                updateUI();
            }
        }

        // เรียกใช้งานครั้งแรกตอนโหลดหน้าเว็บ
        updateUI();
    </script>
</body>
</html>
